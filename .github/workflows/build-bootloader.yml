name: Build Bootloader

on:
  push:
    paths:
      - 'atmega/bootloader/**'
  pull_request:
    paths:
      - 'atmega/bootloader/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          wget -q https://github.com/nicman23/devkit/releases/download/v1.0/avr-devkit-x64-linux.tar.gz -O /tmp/avr.tar.gz
          sudo tar -xzf /tmp/avr.tar.gz -C /usr/local
          echo "Installed avr-gcc: $(/usr/local/avr-devkit/bin/avr-gcc --version | head -1)"

      - name: Build
        run: |
          cd atmega/bootloader
          PATH="/usr/local/avr-devkit/bin:$PATH" make

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-hex
          path: atmega/bootloader/bin/
