name: Build Bootloader

on:
  push:
    paths:
      - 'atmega/bootloader/**'
  pull_request:
    paths:
      - 'atmega/bootloader/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          wget -q https://github.com/modm-io/avr-gcc/releases/download/v14.2.0/modm-avr-gcc.tar.bz2 -O /tmp/avr.tar.bz2
          sudo tar -xjf /tmp/avr.tar.bz2 -C /opt
          echo "Installed avr-gcc: $(/opt/avr-gcc/bin/avr-gcc --version | head -1)"

      - name: Build
        run: |
          cd atmega/bootloader
          PATH="/opt/avr-gcc/bin:$PATH" make

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-hex
          path: atmega/bootloader/bin/
