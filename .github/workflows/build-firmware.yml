name: Build Firmware Tools

on:
  workflow_call:
  push:
    paths:
      - 'rpi/firmware/**'
  pull_request:
    paths:
      - 'rpi/firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu

      - name: Build
        run: |
          cd rpi/firmware
          make

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: rpi/firmware/bin/
