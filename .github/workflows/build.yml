name: Build GPIO Tool

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libc6-dev

    - name: Build gpio tool
      working-directory: ./rpi/gpio
      run: |
        make
        ls -la gpio

    - name: Test compilation flags
      working-directory: ./rpi/gpio
      run: |
        make clean
        make CFLAGS="-Wall -Wextra -Werror -O2"
