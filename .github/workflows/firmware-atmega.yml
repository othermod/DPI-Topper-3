name: Firmware ATmega

on:
  workflow_call:
  push:
    paths:
      - 'atmega/**'
  pull_request:
    paths:
      - 'atmega/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AVR toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-avr binutils-avr avr-libc

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: arduino-cli core install arduino:avr

      - name: Build bootloader
        run: |
          cd atmega/bootloader
          make

      - name: Build firmware
        run: |
          cd atmega/firmware
          make all

      - name: Combine hex files
        run: |
          cd atmega
          make combine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-atmega
          path: |
            atmega/bootloader/bootloader.hex
            atmega/firmware/firmware.hex
            atmega/combined.hex
