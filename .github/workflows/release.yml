name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  overlays:
    uses: ./.github/workflows/build-overlays.yml
  audio:
    uses: ./.github/workflows/build-audio.yml
  backlight:
    uses: ./.github/workflows/build-backlight.yml
  firmware:
    uses: ./.github/workflows/build-firmware.yml
  gamepad:
    uses: ./.github/workflows/build-gamepad.yml
  atmega:
    uses: ./.github/workflows/build-atmega.yml
  create-release:
    needs: [overlays, audio, backlight, firmware, gamepad, atmega]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          shopt -s nullglob globstar
          gh release create "v${VERSION}" --draft --title "v${VERSION}" \
            artifacts/**/* \
            --repo "$GITHUB_REPOSITORY"
          shopt -u nullglob globstar
