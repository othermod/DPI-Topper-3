name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  overlays:
    uses: ./.github/workflows/build-overlays.yml
  audio:
    uses: ./.github/workflows/build-audio.yml
  backlight:
    uses: ./.github/workflows/build-backlight.yml
  firmware:
    uses: ./.github/workflows/build-firmware.yml
  gamepad:
    uses: ./.github/workflows/build-gamepad.yml
  atmega:
    uses: ./.github/workflows/build-atmega.yml
  create-release:
    needs: [overlays, audio, backlight, firmware, gamepad, atmega]
    runs-on: ubuntu-latest
    steps:
      - name: Sanitize version
        id: sanitize
        run: |
          VERSION=$(echo "${{ github.event.inputs.version }}" | tr -d ' ' | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create tag
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.sanitize.outputs.version }}',
              sha: context.sha
            })
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts
      - name: Zip each artifact
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            zip -r "${name}.zip" "$dir" -x "*.DS_Store"
          done
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sanitize.outputs.version }}
          generate_release_notes: true
          files: '*.zip'
