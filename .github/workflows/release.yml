name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  lcd:
    uses: ./.github/workflows/overlay-lcd.yml
  audio:
    uses: ./.github/workflows/overlay-audio.yml
  backlight:
    uses: ./.github/workflows/utility-backlight.yml
  firmware:
    uses: ./.github/workflows/utility-firmware.yml
  gamepad:
    uses: ./.github/workflows/utility-gamepad.yml
  touch:
    uses: ./.github/workflows/utility-touch.yml
  atmega:
    uses: ./.github/workflows/firmware-atmega.yml
  gpio:
    uses: ./.github/workflows/utility-gpio.yml
  create-release:
    needs: [lcd, audio, backlight, firmware, gamepad, touch, atmega, gpio]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts

      - name: Zip each artifact
        run: |
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir")
              zip -r "${name}.zip" "$dir" -x "*.DS_Store"
            fi
          done

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#[vV]}"
          gh release create "${VERSION}" --draft --title "${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            *-*.zip
