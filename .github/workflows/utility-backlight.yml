name: Utility Backlight

on:
  workflow_call:
  push:
    paths:
      - 'rpi/backlight/**'
  pull_request:
    paths:
      - 'rpi/backlight/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu libc6-dev-armel-cross libc6-dev-arm64-cross make

      - name: Build 32-bit
        run: |
          cd rpi/backlight
          make 32

      - name: Build 64-bit
        run: |
          cd rpi/backlight
          make 64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backlight
          path: |
            rpi/backlight/32
            rpi/backlight/64
